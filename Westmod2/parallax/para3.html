<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>para3</title>
    <link rel="stylesheet" href="para.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  </head>
  <body>
    <style>
      .panel {
        height: 100vh;
        position: relative;
        overflow: hidden;
      }
      .panel img {
        width: 100%;
        height: 120%;
        object-fit: cover;
        position: absolute;
        top: 0;
        left: 0;
      }
      .panel h2 {
        position: relative;
        z-index: 1;
        color: white;
        text-align: center;
        padding-top: 40vh;
        margin: 0;
      }
      section {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      section.gradient {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      }
      section.light {
        background: #f5f5f5;
      }
      section > div {
        text-align: center;
      }
      section.gradient > div {
        color: white;
      }
      section.light > div {
        color: #333;
      }
      section h2 {
        font-size: 3em;
        margin: 0;
      }
      section p {
        font-size: 1.2em;
        margin-top: 20px;
      }
      section.light p {
        color: #666;
      }
      section.gradient2 {
        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      }
    </style>

    <div class="panel">
      <img
        src="benjamin-voros-phIFdC6lA4E-unsplash.jpg"
        alt="mountain"
        id="parallax-bg"
      />
      <h2>Section Title</h2>
    </div>

    <section class="gradient">
      <div>
        <h2>Regular Section</h2>
        <p>This is a normal scrolling section</p>
      </div>
    </section>

    <div class="panel">
      <img
        src="benjamin-voros-phIFdC6lA4E-unsplash.jpg"
        alt="mountain2"
        id="parallax-bg2"
      />
      <h2>Parallax Section 2</h2>
    </div>

    <section class="light">
      <div>
        <h2>Content Section</h2>
        <p>Scroll to see parallax effect</p>
      </div>
    </section>

    <div class="panel">
      <img
        src="benjamin-voros-phIFdC6lA4E-unsplash.jpg"
        alt="mountain3"
        id="parallax-bg3"
      />
      <h2>Parallax Section 3</h2>
    </div>

    <section class="gradient2">
      <div>
        <h2>Final Section</h2>
        <p>Thanks for scrolling!</p>
      </div>
    </section>

    <script>
      gsap.registerPlugin(ScrollTrigger);

      // Parallax for all panels
      const panels = document.querySelectorAll(".panel");
      panels.forEach((panel, index) => {
        const img = panel.querySelector("img");
        gsap.to(img, {
          y: "-20%",
          ease: "none",
          scrollTrigger: {
            trigger: panel,
            start: "top bottom",
            end: "bottom top",
            scrub: true,
            markers: false,
          },
        });
      });
    </script>
  </body>
</html>
