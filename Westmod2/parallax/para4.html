<html lang="en">
  <head>
    <meta charset="UTF-8" />

  <body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>para4</title>
        <link rel="stylesheet" href="para.css" />
        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
      </head>
      <body>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

        <style>
          body {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
          }

          .tilt-card {
            width: 300px;
            height: 400px;
            perspective: 1000px;
            display: flex;
            align-items: center;
            justify-content: center;
          }

          .tilt-inner {
            width: 100%;
            height: 100%;
            transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
            display: flex;
            align-items: center;
            justify-content: center;
          }

          .tilt-inner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
          }
        </style>

        <div class="tilt-card">
          <div class="tilt-inner" id="card">
            <img src="benjamin-voros-phIFdC6lA4E-unsplash.jpg" />
          </div>
        </div>

        <script>
          const card = document.getElementById("card");
          const maxTilt = 15; // degrees

          card.parentElement.addEventListener("mousemove", (e) => {
            console.log(e);
            const rect = card.parentElement.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width - 0.5; // -0.5 to 0.5
            const y = (e.clientY - rect.top) / rect.height - 0.5;
            card.style.transform = `rotateY(${x * maxTilt}deg) rotateX(${-y * maxTilt}deg)`;
          });

          card.parentElement.addEventListener("mouseleave", () => {
            card.style.transform = "rotateY(0) rotateX(0)";
          });
        </script>
      </body>
    </html>
  </body>
</html>
