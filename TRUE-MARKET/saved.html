<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrueMarket - Manage User</title>
  <!-- css-files -->
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/admin.css" />
  <link rel="stylesheet" href="css/saved.css" />
  <!-- google-fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&display=swap"
    rel="stylesheet" />
</head>

<body>
  <div class="layout">
    <!-- ══════════ SIDEBAR ══════════ -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-outer">
        <div class="logo">
          <a href=""> <img src="./img/mainlogo.svg" alt="" /></a>
        </div>

        <nav class="nav">
          <div class="nav-item active">
            <a href="#">
              <img src="./img/Dashboard.svg" alt="" />
              Dashboard</a>
          </div>
          <div class="nav-item">
            <a href="#">
              <img src="./img/ManageUsers.svg" alt="" />
              Manage Users
            </a>
          </div>
          <div class="nav-item">
            <a href="#">
              <img src="./img/PropertySearch.svg" alt="" />
              Property Search
            </a>
          </div>
          <div class="nav-item">
            <a href="#">
              <img src="./img/SavedProperties.svg" alt="" />
              Saved Properties
            </a>
          </div>
          <div class="nav-item">
            <a href="#">
              <img src="./img/SearchAlerts.svg" alt="" />
              Search/Alerts
            </a>
          </div>
        </nav>

        <div class="sidebar-bottom">
          <div class="nav-item">
            <a href="#">
              <img src="./img/Settings.svg" alt="" />
              Settings
            </a>
          </div>
          <div class="nav-item">
            <a href="#">
              <img src="./img/Logout.svg" alt="" />
              Log out
            </a>
          </div>
        </div>
      </div>
    </aside>

    <!-- Mobile overlay -->
    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

    <!-- ══════════ MAIN ══════════ -->
    <div class="main-wrap">
      <!-- Header -->
      <header class="header">
        <button class="hamburger" id="hamburger" onclick="toggleSidebar()" title="Toggle sidebar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
        </button>

        <div class="search-bar">
          <img src="./img/search.svg" alt="" />
          <input type="text" placeholder="Search here..." />
          <a href="#"> <img src="./img/sound-module-fill.svg" alt="" /></a>
        </div>

        <div class="header-right">
          <button class="icon-btn" id="top-emai">
            <img src="./img/top-email.svg" alt="email" />
          </button>
          <button class="icon-btn" id="notifaction">
            <img src="./img/notifaction.svg" alt="notifatction" />
            <span class="badge"></span>
          </button>
          <div class="user-pill">
            <div class="avatar">
              <img src="./img/AlexThompson.png" alt="profile-photo" />
            </div>
            <div class="user-info">
              <div class="name f-14">Alex Thompson</div>
              <div class="role">Admin</div>
            </div>
          </div>
        </div>
      </header>

      <!-- Content -->
      <main class="content saved-content">
          <div class="saved-top">
            <p>Saved Searches</p>
          </div>

          <div class="property">
            
          </div>
      </main>
    </div>
    <!-- /main-wrap -->
  </div>
</body>

</html>
