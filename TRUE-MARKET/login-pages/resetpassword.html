<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rest-Password</title>
    <!-- css-files -->
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/resetpassword.css" />
    <!-- google-fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="reset-outer ad-flex">
      <div class="reset-password-container">
        <div class="reset-main">
          <div class="login-logo">
            <img src="logo.svg" alt="logo" />
          </div>
          <p class="f-18 b-700 rp-text">Reset Password</p>
          <p class="f-14 b-500 rp-sub-text">
            Enter your email address and we'll send you an email with
            instructions to reset your password.
          </p>
          <form action="" id="reset-password">
            <div class="form-group">
              <label for="email">Email</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="Enter your email"
                required
              />
              <button type="submit" class="repassword-btn cta cta-green">
                Reset Password
              </button>
            </div>
          </form>
        </div>
        <div class="sing-in-already">Back to <a href="#">Sign In</a></div>
      </div>
    </div>
  </body>
</html>
