<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #060a0f;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script>
        (function() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');

            // ─────────────────────────────────────
            // Configuration
            // ─────────────────────────────────────
            const CELL_SIZE = 90;
            const DOT_RADIUS = 2.5;
            const DASH_GAP = 10; // gap from dot center to dash start
            const DASH_LENGTH = 22; // length of each dash segment
            const DASH_BASE_OPACITY = 0.28;
            const DOT_BASE_OPACITY = 0.35;
            const PROXIMITY_THRESHOLD = 110; // distance within which blobs affect elements
            const BLOB_COLOR = '#2D5390';
            const DOT_COLOR = '#ededed';
            const CELL_DURATION = 2.6; // seconds per cell crossing
            const NUM_GLITCH_SLOTS = 6;

            // ─────────────────────────────────────
            // State
            // ─────────────────────────────────────
            let width, height;
            let cols, rows;
            let gridOffsetX, gridOffsetY;

            // Blob states
            // Vertical blob: moves along a column (x fixed, y varies)
            let vBlob = {
                colIdx: 0, // which column (integer)
                colX: 0, // pixel x of the column
                fromRow: 0, // starting row for current cell crossing
                toRow: 1, // target row
                progress: 0, // 0..1 eased progress within cell
                rawProgress: 0, // actual time-based progress
                direction: 1, // +1 = moving down, -1 = moving up
                px: 0, // current pixel x
                py: 0, // current pixel y
            };

            // Horizontal blob: moves along a row (y fixed, x varies)
            let hBlob = {
                rowIdx: 0,
                rowY: 0,
                fromCol: 0,
                toCol: 1,
                progress: 0,
                rawProgress: 0,
                direction: 1, // +1 = moving right, -1 = moving left
                px: 0,
                py: 0,
            };

            // Glitch line slots
            let glitchSlots = [];
            let allGlitchEdges = []; // pool of possible edges [{x1,y1,x2,y2}, ...]

            // Timing
            let lastTime = 0;
            let vCellStartTime = 0;
            let hCellStartTime = 0;

            // ─────────────────────────────────────
            // Easing function (ease-in-out cubic)
            // ─────────────────────────────────────
            function easeInOutCubic(t) {
                return t < 0.5 ?
                    4 * t * t * t :
                    1 - Math.pow(-2 * t + 2, 3) / 2;
            }

            // ─────────────────────────────────────
            // Resize handler
            // ─────────────────────────────────────
            function resize() {
                const dpr = window.devicePixelRatio || 1;
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width * dpr;
                canvas.height = height * dpr;
                canvas.style.width = width + 'px';
                canvas.style.height = height + 'px';
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.scale(dpr, dpr);

                // Recalculate grid dimensions
                cols = Math.ceil(width / CELL_SIZE) + 2;
                rows = Math.ceil(height / CELL_SIZE) + 2;
                gridOffsetX = -CELL_SIZE + (width % CELL_SIZE) / 2;
                gridOffsetY = -CELL_SIZE + (height % CELL_SIZE) / 2;

                // Recenter grid offset so the grid is roughly centered
                gridOffsetX = -CELL_SIZE + ((width % CELL_SIZE) / 2);
                gridOffsetY = -CELL_SIZE + ((height % CELL_SIZE) / 2);

                // Rebuild glitch edge pool
                buildGlitchEdgePool();

                // Re-clamp blob positions
                clampBlobPositions();
            }

            function getDotX(col) {
                return gridOffsetX + col * CELL_SIZE;
            }

            function getDotY(row) {
                return gridOffsetY + row * CELL_SIZE;
            }

            function clampBlobPositions() {
                // Vertical blob
                vBlob.colIdx = Math.max(0, Math.min(cols - 1, vBlob.colIdx));
                vBlob.colX = getDotX(vBlob.colIdx);
                vBlob.fromRow = Math.max(0, Math.min(rows - 1, vBlob.fromRow));
                vBlob.toRow = Math.max(0, Math.min(rows - 1, vBlob.toRow));
                if (vBlob.toRow === vBlob.fromRow) {
                    vBlob.toRow = Math.min(rows - 1, vBlob.fromRow + vBlob.direction);
                }
                vBlob.py = getDotY(vBlob.fromRow) + (getDotY(vBlob.toRow) - getDotY(vBlob.fromRow)) * vBlob
                .progress;
                vBlob.px = vBlob.colX;

                // Horizontal blob
                hBlob.rowIdx = Math.max(0, Math.min(rows - 1, hBlob.rowIdx));
                hBlob.rowY = getDotY(hBlob.rowIdx);
                hBlob.fromCol = Math.max(0, Math.min(cols - 1, hBlob.fromCol));
                hBlob.toCol = Math.max(0, Math.min(cols - 1, hBlob.toCol));
                if (hBlob.toCol === hBlob.fromCol) {
                    hBlob.toCol = Math.min(cols - 1, hBlob.fromCol + hBlob.direction);
                }
                hBlob.px = getDotX(hBlob.fromCol) + (getDotX(hBlob.toCol) - getDotX(hBlob.fromCol)) * hBlob
                .progress;
                hBlob.py = hBlob.rowY;
            }

            // ─────────────────────────────────────
            // Glitch edge pool
            // ─────────────────────────────────────
            function buildGlitchEdgePool() {
                allGlitchEdges = [];
                // Horizontal edges (between dot at (c, r) and (c+1, r))
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols - 1; c++) {
                        const x1 = getDotX(c);
                        const y1 = getDotY(r);
                        const x2 = getDotX(c + 1);
                        const y2 = getDotY(r);
                        // Only include if at least partially visible
                        if (x2 > -CELL_SIZE && x1 < width + CELL_SIZE &&
                            y1 > -CELL_SIZE && y1 < height + CELL_SIZE) {
                            allGlitchEdges.push({ x1, y1, x2, y2, type: 'h' });
                        }
                    }
                }
                // Vertical edges (between dot at (c, r) and (c, r+1))
                for (let r = 0; r < rows - 1; r++) {
                    for (let c = 0; c < cols; c++) {
                        const x1 = getDotX(c);
                        const y1 = getDotY(r);
                        const x2 = getDotX(c);
                        const y2 = getDotY(r + 1);
                        if (x1 > -CELL_SIZE && x1 < width + CELL_SIZE &&
                            y2 > -CELL_SIZE && y1 < height + CELL_SIZE) {
                            allGlitchEdges.push({ x1, y1, x2, y2, type: 'v' });
                        }
                    }
                }
            }

            function createGlitchSlot() {
                return {
                    edge: null,
                    opacity: 0,
                    state: 'inactive', // 'inactive' | 'fadingIn' | 'holding' | 'fadingOut'
                    timer: Math.random() * 4, // initial random delay
                    fadeInDur: 0.3 + Math.random() * 0.7,
                    holdDur: 0.4 + Math.random() * 2.2,
                    fadeOutDur: 0.3 + Math.random() * 0.7,
                    inactiveDur: 0.6 + Math.random() * 3.5,
                    maxOpacity: 0.35 + Math.random() * 0.45,
                };
            }

            function initGlitchSlots() {
                glitchSlots = [];
                for (let i = 0; i < NUM_GLITCH_SLOTS; i++) {
                    glitchSlots.push(createGlitchSlot());
                }
            }

            function pickRandomEdge() {
                if (allGlitchEdges.length === 0) return null;
                const idx = Math.floor(Math.random() * allGlitchEdges.length);
                return allGlitchEdges[idx];
            }

            function updateGlitchSlots(dt) {
                for (let slot of glitchSlots) {
                    slot.timer -= dt;
                    switch (slot.state) {
                        case 'inactive':
                            if (slot.timer <= 0) {
                                // Pick a new edge
                                slot.edge = pickRandomEdge();
                                if (slot.edge) {
                                    slot.state = 'fadingIn';
                                    slot.timer = slot.fadeInDur;
                                    slot.opacity = 0;
                                } else {
                                    slot.timer = slot.inactiveDur;
                                }
                            }
                            break;
                        case 'fadingIn':
                            slot.opacity = slot.maxOpacity * (1 - Math.max(0, slot.timer / slot.fadeInDur));
                            if (slot.timer <= 0) {
                                slot.opacity = slot.maxOpacity;
                                slot.state = 'holding';
                                slot.timer = slot.holdDur;
                            }
                            break;
                        case 'holding':
                            if (slot.timer <= 0) {
                                slot.state = 'fadingOut';
                                slot.timer = slot.fadeOutDur;
                            }
                            break;
                        case 'fadingOut':
                            slot.opacity = slot.maxOpacity * Math.max(0, slot.timer / slot.fadeOutDur);
                            if (slot.timer <= 0) {
                                slot.opacity = 0;
                                slot.state = 'inactive';
                                slot.timer = slot.inactiveDur;
                                slot.edge = null;
                            }
                            break;
                    }
                }
            }

            // ─────────────────────────────────────
            // Blob update
            // ─────────────────────────────────────
            function updateVerticalBlob(dt) {
                if (rows < 2) return;
                vBlob.rawProgress += dt / CELL_DURATION;
                if (vBlob.rawProgress >= 1.0) {
                    // Finished crossing this cell
                    vBlob.rawProgress -= 1.0;
                    vBlob.fromRow = vBlob.toRow;
                    vBlob.toRow = vBlob.fromRow + vBlob.direction;

                    // Check bounds
                    if (vBlob.toRow >= rows || vBlob.toRow < 0) {
                        // Teleport!
                        const oldCol = vBlob.colIdx;
                        let newCol;
                        do {
                            newCol = Math.floor(Math.random() * cols);
                        } while (newCol === oldCol && cols > 1);

                        vBlob.colIdx = newCol;
                        vBlob.colX = getDotX(vBlob.colIdx);

                        // Place at opposite side
                        if (vBlob.direction > 0) {
                            // Was moving down, teleport to top
                            vBlob.fromRow = 0;
                            vBlob.toRow = 1;
                        } else {
                            // Was moving up, teleport to bottom
                            vBlob.fromRow = rows - 1;
                            vBlob.toRow = rows - 2;
                        }
                        // Randomly maybe flip direction
                        if (Math.random() < 0.4) {
                            vBlob.direction *= -1;
                            // Recalculate toRow
                            vBlob.toRow = vBlob.fromRow + vBlob.direction;
                            if (vBlob.toRow < 0) vBlob.toRow = 1;
                            if (vBlob.toRow >= rows) vBlob.toRow = rows - 2;
                        }
                    }
                    vBlob.rawProgress = Math.max(0, Math.min(1, vBlob.rawProgress));
                }

                // Clamp to valid range
                if (vBlob.toRow >= rows) {
                    vBlob.toRow = rows - 1;
                    vBlob.fromRow = Math.max(0, vBlob.toRow - 1);
                }
                if (vBlob.toRow < 0) {
                    vBlob.toRow = 0;
                    vBlob.fromRow = Math.min(rows - 1, vBlob.toRow + 1);
                }
                if (vBlob.fromRow >= rows) vBlob.fromRow = rows - 1;
                if (vBlob.fromRow < 0) vBlob.fromRow = 0;

                vBlob.progress = easeInOutCubic(Math.max(0, Math.min(1, vBlob.rawProgress)));
                vBlob.colX = getDotX(vBlob.colIdx);
                const fromY = getDotY(vBlob.fromRow);
                const toY = getDotY(vBlob.toRow);
                vBlob.py = fromY + (toY - fromY) * vBlob.progress;
                vBlob.px = vBlob.colX;
            }

            function updateHorizontalBlob(dt) {
                if (cols < 2) return;
                hBlob.rawProgress += dt / CELL_DURATION;
                if (hBlob.rawProgress >= 1.0) {
                    hBlob.rawProgress -= 1.0;
                    hBlob.fromCol = hBlob.toCol;
                    hBlob.toCol = hBlob.fromCol + hBlob.direction;

                    if (hBlob.toCol >= cols || hBlob.toCol < 0) {
                        // Teleport!
                        const oldRow = hBlob.rowIdx;
                        let newRow;
                        do {
                            newRow = Math.floor(Math.random() * rows);
                        } while (newRow === oldRow && rows > 1);

                        hBlob.rowIdx = newRow;
                        hBlob.rowY = getDotY(hBlob.rowIdx);

                        if (hBlob.direction > 0) {
                            hBlob.fromCol = 0;
                            hBlob.toCol = 1;
                        } else {
                            hBlob.fromCol = cols - 1;
                            hBlob.toCol = cols - 2;
                        }
                        if (Math.random() < 0.4) {
                            hBlob.direction *= -1;
                            hBlob.toCol = hBlob.fromCol + hBlob.direction;
                            if (hBlob.toCol < 0) hBlob.toCol = 1;
                            if (hBlob.toCol >= cols) hBlob.toCol = cols - 2;
                        }
                    }
                    hBlob.rawProgress = Math.max(0, Math.min(1, hBlob.rawProgress));
                }

                if (hBlob.toCol >= cols) {
                    hBlob.toCol = cols - 1;
                    hBlob.fromCol = Math.max(0, hBlob.toCol - 1);
                }
                if (hBlob.toCol < 0) {
                    hBlob.toCol = 0;
                    hBlob.fromCol = Math.min(cols - 1, hBlob.toCol + 1);
                }
                if (hBlob.fromCol >= cols) hBlob.fromCol = cols - 1;
                if (hBlob.fromCol < 0) hBlob.fromCol = 0;

                hBlob.progress = easeInOutCubic(Math.max(0, Math.min(1, hBlob.rawProgress)));
                hBlob.rowY = getDotY(hBlob.rowIdx);
                const fromX = getDotX(hBlob.fromCol);
                const toX = getDotX(hBlob.toCol);
                hBlob.px = fromX + (toX - fromX) * hBlob.progress;
                hBlob.py = hBlob.rowY;
            }

            // ─────────────────────────────────────
            // Proximity helpers
            // ─────────────────────────────────────
            function distToBlobs(px, py) {
                const dV = Math.hypot(px - vBlob.px, py - vBlob.py);
                const dH = Math.hypot(px - hBlob.px, py - hBlob.py);
                return Math.min(dV, dH);
            }

            function getInfluenceFactor(px, py) {
                const d = distToBlobs(px, py);
                if (d >= PROXIMITY_THRESHOLD) return 0;
                // Smooth falloff (cosine-based)
                const t = d / PROXIMITY_THRESHOLD;
                return (1 + Math.cos(Math.PI * t)) / 2; // 1 at d=0, 0 at d=threshold
            }

            function lerpColor(hex1, hex2, t) {
                const r1 = parseInt(hex1.slice(1, 3), 16);
                const g1 = parseInt(hex1.slice(3, 5), 16);
                const b1 = parseInt(hex1.slice(5, 7), 16);
                const r2 = parseInt(hex2.slice(1, 3), 16);
                const g2 = parseInt(hex2.slice(3, 5), 16);
                const b2 = parseInt(hex2.slice(5, 7), 16);
                const r = Math.round(r1 + (r2 - r1) * t);
                const g = Math.round(g1 + (g2 - g1) * t);
                const b = Math.round(b1 + (b2 - b1) * t);
                return `rgb(${r},${g},${b})`;
            }

            // ─────────────────────────────────────
            // Rendering
            // ─────────────────────────────────────
            function drawBackground() {
                // Deep charcoal background
                ctx.fillStyle = '#060a0f';
                ctx.fillRect(0, 0, width, height);

                // Subtle vignette
                const vignetteGrad = ctx.createRadialGradient(
                    width / 2, height / 2, Math.min(width, height) * 0.55,
                    width / 2, height / 2, Math.max(width, height) * 0.75
                );
                vignetteGrad.addColorStop(0, 'rgba(6,10,15,0)');
                vignetteGrad.addColorStop(1, 'rgba(2,4,8,0.7)');
                ctx.fillStyle = vignetteGrad;
                ctx.fillRect(0, 0, width, height);
            }

            function drawBlobGlows() {
                // Draw large soft glows behind blobs
                const blobs = [
                    { px: vBlob.px, py: vBlob.py, elongation: 'vertical' },
                    { px: hBlob.px, py: hBlob.py, elongation: 'horizontal' },
                ];

                for (const blob of blobs) {
                    const { px, py, elongation } = blob;
                    if (px === undefined || py === undefined) continue;
                    if (px < -200 || px > width + 200 || py < -200 || py > height + 200) continue;

                    ctx.save();
                    ctx.translate(px, py);
                    if (elongation === 'vertical') {
                        ctx.scale(0.55, 1.0);
                    } else {
                        ctx.scale(1.0, 0.55);
                    }

                    // Layer 1: largest, most transparent
                    const g1 = ctx.createRadialGradient(0, 0, 0, 0, 0, 90);
                    g1.addColorStop(0, 'rgba(45,83,144,0.18)');
                    g1.addColorStop(0.35, 'rgba(45,83,144,0.09)');
                    g1.addColorStop(0.7, 'rgba(45,83,144,0.02)');
                    g1.addColorStop(1, 'rgba(45,83,144,0)');
                    ctx.fillStyle = g1;
                    ctx.beginPath();
                    ctx.arc(0, 0, 90, 0, Math.PI * 2);
                    ctx.fill();

                    // Layer 2: medium
                    const g2 = ctx.createRadialGradient(0, 0, 0, 0, 0, 50);
                    g2.addColorStop(0, 'rgba(45,83,144,0.35)');
                    g2.addColorStop(0.4, 'rgba(45,83,144,0.15)');
                    g2.addColorStop(0.75, 'rgba(45,83,144,0.03)');
                    g2.addColorStop(1, 'rgba(45,83,144,0)');
                    ctx.fillStyle = g2;
                    ctx.beginPath();
                    ctx.arc(0, 0, 50, 0, Math.PI * 2);
                    ctx.fill();

                    // Layer 3: inner glow
                    const g3 = ctx.createRadialGradient(0, 0, 0, 0, 0, 22);
                    g3.addColorStop(0, 'rgba(60,110,180,0.7)');
                    g3.addColorStop(0.5, 'rgba(45,83,144,0.3)');
                    g3.addColorStop(1, 'rgba(45,83,144,0)');
                    ctx.fillStyle = g3;
                    ctx.beginPath();
                    ctx.arc(0, 0, 22, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.restore();
                }
            }

            function drawBlobCores() {
                const blobs = [
                    { px: vBlob.px, py: vBlob.py, elongation: 'vertical' },
                    { px: hBlob.px, py: hBlob.py, elongation: 'horizontal' },
                ];

                for (const blob of blobs) {
                    const { px, py, elongation } = blob;
                    if (px === undefined || py === undefined) continue;
                    if (px < -100 || px > width + 100 || py < -100 || py > height + 100) continue;

                    ctx.save();
                    ctx.translate(px, py);
                    if (elongation === 'vertical') {
                        ctx.scale(0.45, 1.0);
                    } else {
                        ctx.scale(1.0, 0.45);
                    }

                    // Bright core
                    const gCore = ctx.createRadialGradient(0, 0, 0, 0, 0, 14);
                    gCore.addColorStop(0, 'rgba(160,195,235,0.95)');
                    gCore.addColorStop(0.3, 'rgba(80,130,200,0.8)');
                    gCore.addColorStop(0.6, 'rgba(45,83,144,0.4)');
                    gCore.addColorStop(1, 'rgba(45,83,144,0)');
                    ctx.fillStyle = gCore;
                    ctx.beginPath();
                    ctx.arc(0, 0, 14, 0, Math.PI * 2);
                    ctx.fill();

                    // Tiny bright center
                    const gBright = ctx.createRadialGradient(0, 0, 0, 0, 0, 5);
                    gBright.addColorStop(0, 'rgba(220,235,255,0.95)');
                    gBright.addColorStop(0.5, 'rgba(140,180,220,0.6)');
                    gBright.addColorStop(1, 'rgba(60,100,160,0)');
                    ctx.fillStyle = gBright;
                    ctx.beginPath();
                    ctx.arc(0, 0, 5, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.restore();
                }
            }

            function drawGrid() {
                // Iterate over all visible grid intersections
                const startCol = Math.max(0, Math.floor((-gridOffsetX - DASH_LENGTH - DASH_GAP) / CELL_SIZE));
                const endCol = Math.min(cols - 1, Math.ceil((width - gridOffsetX + DASH_LENGTH + DASH_GAP) /
                    CELL_SIZE));
                const startRow = Math.max(0, Math.floor((-gridOffsetY - DASH_LENGTH - DASH_GAP) / CELL_SIZE));
                const endRow = Math.min(rows - 1, Math.ceil((height - gridOffsetY + DASH_LENGTH + DASH_GAP) /
                    CELL_SIZE));

                // First pass: collect all dash segments with their proximity-adjusted styles
                const dashesToDraw = [];

                for (let r = startRow; r <= endRow; r++) {
                    for (let c = startCol; c <= endCol; c++) {
                        const dx = getDotX(c);
                        const dy = getDotY(r);

                        // Define the 4 dash segments from this dot
                        const dashDefs = [
                            { x1: dx + DASH_GAP, y1: dy, x2: dx + DASH_GAP + DASH_LENGTH, y2: dy }, // right
                            { x1: dx - DASH_GAP, y1: dy, x2: dx - DASH_GAP - DASH_LENGTH, y2: dy }, // left
                            { x1: dx, y1: dy + DASH_GAP, x2: dx, y2: dy + DASH_GAP + DASH_LENGTH }, // down
                            { x1: dx, y1: dy - DASH_GAP, x2: dx, y2: dy - DASH_GAP - DASH_LENGTH }, // up
                        ];

                        for (const dash of dashDefs) {
                            const midX = (dash.x1 + dash.x2) / 2;
                            const midY = (dash.y1 + dash.y2) / 2;
                            const influence = getInfluenceFactor(midX, midY);
                            const opacity = DASH_BASE_OPACITY + influence * (0.75 - DASH_BASE_OPACITY);
                            const color = influence > 0.01 ?
                                lerpColor('#ededed', BLOB_COLOR, influence) :
                                '#ededed';
                            const lineWidth = 1.0 + influence * 1.2;

                            dashesToDraw.push({
                                x1: dash.x1,
                                y1: dash.y1,
                                x2: dash.x2,
                                y2: dash.y2,
                                opacity,
                                color,
                                lineWidth,
                            });
                        }
                    }
                }

                // Draw all dashes
                for (const dash of dashesToDraw) {
                    ctx.strokeStyle = dash.color;
                    ctx.globalAlpha = dash.opacity;
                    ctx.lineWidth = dash.lineWidth;
                    ctx.lineCap = 'round';
                    ctx.beginPath();
                    ctx.moveTo(dash.x1, dash.y1);
                    ctx.lineTo(dash.x2, dash.y2);
                    ctx.stroke();
                }
                ctx.globalAlpha = 1;

                // Draw dots
                for (let r = startRow; r <= endRow; r++) {
                    for (let c = startCol; c <= endCol; c++) {
                        const dx = getDotX(c);
                        const dy = getDotY(r);

                        const influence = getInfluenceFactor(dx, dy);
                        const opacity = DOT_BASE_OPACITY + influence * (0.9 - DOT_BASE_OPACITY);
                        const radius = DOT_RADIUS + influence * 2.0;
                        const color = influence > 0.02 ?
                            lerpColor('#ededed', BLOB_COLOR, influence) :
                            '#ededed';

                        // Draw glow halo behind highly-influenced dots
                        if (influence > 0.15) {
                            const haloGrad = ctx.createRadialGradient(dx, dy, radius * 0.5, dx, dy, radius * 2.5);
                            haloGrad.addColorStop(0, `rgba(45,83,144,${influence * 0.5})`);
                            haloGrad.addColorStop(1, 'rgba(45,83,144,0)');
                            ctx.fillStyle = haloGrad;
                            ctx.beginPath();
                            ctx.arc(dx, dy, radius * 2.5, 0, Math.PI * 2);
                            ctx.fill();
                        }

                        ctx.fillStyle = color;
                        ctx.globalAlpha = opacity;
                        ctx.beginPath();
                        ctx.arc(dx, dy, radius, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
                ctx.globalAlpha = 1;
            }

            function drawGlitchLines() {
                for (const slot of glitchSlots) {
                    if (slot.opacity <= 0.005 || !slot.edge) continue;
                    const e = slot.edge;
                    ctx.strokeStyle = '#ededed';
                    ctx.globalAlpha = slot.opacity;
                    ctx.lineWidth = 1.6;
                    ctx.lineCap = 'round';
                    ctx.shadowColor = `rgba(180,210,240,${slot.opacity * 0.6})`;
                    ctx.shadowBlur = 8 * slot.opacity;
                    ctx.beginPath();
                    ctx.moveTo(e.x1, e.y1);
                    ctx.lineTo(e.x2, e.y2);
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                }
                ctx.globalAlpha = 1;
            }

            // ─────────────────────────────────────
            // Main animation loop
            // ─────────────────────────────────────
            function animate(timestamp) {
                if (!lastTime) lastTime = timestamp;
                let dt = (timestamp - lastTime) / 1000;
                if (dt <= 0) dt = 0.016;
                if (dt > 0.2) dt = 0.2; // cap to avoid jumps on tab switch
                lastTime = timestamp;

                // Update blobs
                updateVerticalBlob(dt);
                updateHorizontalBlob(dt);

                // Update glitch slots
                updateGlitchSlots(dt);

                // Render
                drawBackground();
                drawBlobGlows();
                drawGrid();
                drawGlitchLines();
                drawBlobCores();

                requestAnimationFrame(animate);
            }

            // ─────────────────────────────────────
            // Initialization
            // ─────────────────────────────────────
            function init() {
                resize();
                initGlitchSlots();

                // Initialize vertical blob
                vBlob.colIdx = Math.floor(Math.random() * Math.max(1, cols));
                vBlob.colX = getDotX(vBlob.colIdx);
                vBlob.fromRow = Math.floor(Math.random() * Math.max(1, rows - 1));
                vBlob.direction = Math.random() < 0.5 ? 1 : -1;
                vBlob.toRow = vBlob.fromRow + vBlob.direction;
                if (vBlob.toRow < 0) { vBlob.toRow = 1;
                    vBlob.fromRow = 0;
                    vBlob.direction = 1; }
                if (vBlob.toRow >= rows) { vBlob.toRow = rows - 2;
                    vBlob.fromRow = rows - 1;
                    vBlob.direction = -1; }
                vBlob.rawProgress = Math.random();
                vBlob.progress = easeInOutCubic(vBlob.rawProgress);
                vBlob.py = getDotY(vBlob.fromRow) + (getDotY(vBlob.toRow) - getDotY(vBlob.fromRow)) * vBlob.progress;
                vBlob.px = vBlob.colX;

                // Initialize horizontal blob
                hBlob.rowIdx = Math.floor(Math.random() * Math.max(1, rows));
                hBlob.rowY = getDotY(hBlob.rowIdx);
                hBlob.fromCol = Math.floor(Math.random() * Math.max(1, cols - 1));
                hBlob.direction = Math.random() < 0.5 ? 1 : -1;
                hBlob.toCol = hBlob.fromCol + hBlob.direction;
                if (hBlob.toCol < 0) { hBlob.toCol = 1;
                    hBlob.fromCol = 0;
                    hBlob.direction = 1; }
                if (hBlob.toCol >= cols) { hBlob.toCol = cols - 2;
                    hBlob.fromCol = cols - 1;
                    hBlob.direction = -1; }
                hBlob.rawProgress = Math.random();
                hBlob.progress = easeInOutCubic(hBlob.rawProgress);
                hBlob.px = getDotX(hBlob.fromCol) + (getDotX(hBlob.toCol) - getDotX(hBlob.fromCol)) * hBlob.progress;
                hBlob.py = hBlob.rowY;

                clampBlobPositions();

                lastTime = performance.now();
                requestAnimationFrame(animate);
            }

            // ─────────────────────────────────────
            // Event listeners
            // ─────────────────────────────────────
            window.addEventListener('resize', () => {
                resize();
                clampBlobPositions();
            });

            // Handle visibility change to prevent dt spikes
            document.addEventListener('visibilitychange', () => {
                if (!document.hidden) {
                    lastTime = performance.now();
                }
            });

            // ─────────────────────────────────────
            // Start
            // ─────────────────────────────────────
            init();
        })();
    </script>
</body>
